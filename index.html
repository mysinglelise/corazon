<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Corazón del Mundo — Instrumento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --ink: #141414;
    --ink-dim: #6b6b6b;
    --red: #e0181f;
    --red-deep: #7a0c14;
    --line: rgba(20,20,20,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }
  #cam-bg{
    position:fixed; inset:0; width:100%; height:100%; object-fit:cover;
    transform: scaleX(-1); z-index:0; background:#fff;
  }
  #hand-overlay{ position:fixed; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; }
  #vignette{ display:none; }
  #scene{ position:fixed; inset:0; display:block; z-index:3; background:transparent; }

  #ui{ position:fixed; inset:0; z-index:4; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding: clamp(16px,3vw,40px); }
  #ui > *{ pointer-events:auto; }

  header{ display:flex; flex-direction:column; gap:0; max-width: 620px; }
  .poster-title{
    font-family:'Anton', sans-serif; font-weight:400; text-transform:uppercase;
    font-size: clamp(30px, 6vw, 62px); line-height: 0.92; color: var(--red);
    text-shadow: 0 2px 10px rgba(0,0,0,0.18);
  }
  .poster-single{
    font-family:'Anton', sans-serif; font-weight:400; text-transform:uppercase;
    font-size: clamp(15px, 2.1vw, 22px); letter-spacing:0.04em; color: var(--red);
    margin-top: 4px;
  }
  .poster-sub{
    font-family:'Anton', sans-serif; font-weight:400; text-transform:uppercase;
    font-size: clamp(15px, 2.1vw, 22px); letter-spacing:0.04em; color: var(--ink);
    margin-top: 4px;
  }
  .tour-dates{
    margin-top: 16px; display:flex; flex-direction:column; gap:3px;
    font-family:'IBM Plex Mono', monospace; font-size: 13px; letter-spacing:0.03em; color: var(--ink);
  }
  .tour-dates span em{ font-style:normal; color: var(--red); }
  .tour-dates span{ transition: opacity .25s ease, transform .25s ease; opacity:0; transform: translateY(-3px); display:inline-block; }
  .tour-dates span.active{ opacity:1; transform: translateY(0); font-weight:600; }
  #ui.glitching .poster-title, #ui.glitching .poster-single, #ui.glitching .poster-sub{ animation: glitchText .12s steps(2) infinite; }
  @keyframes glitchText{
    0%{ transform: translate(0,0); }
    50%{ transform: translate(1.5px,-1px); }
    100%{ transform: translate(-1.5px,1px); }
  }

  .panel{
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--line);
    backdrop-filter: blur(6px);
    border-radius: 3px;
  }

  #controls{ display:flex; align-items:flex-end; justify-content:space-between; gap: 20px; flex-wrap: wrap; }

  #start-btn{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    background: transparent; color: var(--ink); border: 1px solid var(--ink-dim);
    padding: 13px 22px; cursor:pointer; transition: all .25s ease;
  }
  #start-btn:hover{ border-color: var(--red); color: var(--red); background: rgba(224,24,31,0.06); }
  #start-btn:disabled{ opacity:0.4; cursor:default; }
  #start-btn.live{ border-color: var(--red); color: var(--red); }
  #stage-toggle{
    position: fixed; top: clamp(12px,2vw,24px); right: clamp(12px,2vw,24px); z-index: 6;
    pointer-events: auto; background: rgba(10,10,10,0.4); color: var(--ink-dim);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 6px 10px;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
    opacity: 0.35; transition: opacity .2s ease;
  }
  #stage-toggle:hover{ opacity: 1; }
  #ui.stage-mode #controls,
  #ui.stage-mode #hand-overlay,
  #ui.stage-mode .poster-title,
  #ui.stage-mode .poster-single,
  #ui.stage-mode .poster-sub{ display:none; }
  #logo-bar{
    position: fixed; left:0; right:0; bottom: clamp(14px,2.5vw,28px); z-index: 5;
    display:flex; justify-content:center; align-items:center; gap: clamp(14px,2vw,24px);
    pointer-events:none;
  }
  #logo-bar img{
    height: clamp(28px,4vw,42px); width:auto; display:block;
    background: rgba(255,255,255,0.92); border-radius: 6px; padding: 6px 10px;
  }
  #reel-mask{ position:fixed; inset:0; z-index:7; display:none; justify-content:space-between; pointer-events:none; }
  #reel-mask.active{ display:flex; }
  #reel-mask .bar{
    width: max(0px, calc((100vw - 100vh * 0.5625) / 2));
    height: 100vh; background:#000;
  }
  #reel-mask .bar.left{ border-right: 1px solid rgba(224,24,31,0.45); }
  #reel-mask .bar.right{ border-left: 1px solid rgba(224,24,31,0.45); }
  #format-toggle{
    position: fixed; top: clamp(12px,2vw,24px); right: clamp(120px,18vw,190px); z-index: 6;
    pointer-events: auto; background: rgba(10,10,10,0.4); color: var(--ink-dim);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 6px 10px;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
    opacity: 0.35; transition: opacity .2s ease;
  }
  #format-toggle:hover{ opacity: 1; }
  #ui.reel-mode header{
    align-self: center;
    max-width: min(620px, calc(100vh * 0.5625 - 2 * clamp(16px,3vw,40px)));
    text-align: center;
  }
  #ui.reel-mode .tour-dates{ align-items: center; }

  #readout{ padding: 12px 16px; min-width: 220px; font-size: 11px; line-height: 1.9; color: var(--ink-dim); }
  #readout .row{ display:flex; justify-content:space-between; gap:14px; }
  #readout .label{ letter-spacing:0.05em; text-transform:uppercase; opacity:0.7; }
  #readout .val{ color: var(--red); font-variant-numeric: tabular-nums; }
  #readout .val.on{ color: var(--red-deep); }

  #bottom-row{ display:flex; align-items:flex-end; justify-content:flex-end; gap:16px; flex-wrap:wrap; }

  ::selection{ background: var(--red); color: #fff; }

  @media (max-width: 640px){
    .lede{ display:none; }
  }
</style>
</head>

<button id="stage-toggle" title="Ocultar panel de control para la puesta en escena (o tecla H)">Modo escenario</button>
<button id="format-toggle" title="Marco vertical 9:16 para grabar Reels (o tecla R)">Formato Reel</button>
<div id="reel-mask"><div class="bar left"></div><div class="bar right"></div></div>

<script>
(function(){

  /* ------------------------------------------------------------------ *
   *  1. NUBE DE PUNTOS — CORAZÓN
   * ------------------------------------------------------------------ */

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.3, 9);

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  // corazón anatómico real: vertices extraidos del .obj (HumanHeart_OBJ),
  // centrados, normalizados y sub-muestreados a 30 000 puntos, embebidos en base64 mas abajo
  const b64 = document.getElementById('heart-b64').textContent;
  const raw = atob(b64);
  const buf = new ArrayBuffer(raw.length);
  const view = new Uint8Array(buf);
  for(let i=0;i<raw.length;i++) view[i] = raw.charCodeAt(i);
  const heartVerts = new Float32Array(buf); // ya normalizado aprox [-0.5,1.0] por eje

  const COUNT = heartVerts.length / 3;
  const positions = new Float32Array(COUNT*3);
  const origPositions = new Float32Array(COUNT*3); // copia inmutable, usada por el shader como base
  const colors = new Float32Array(COUNT*3);

  const colInner = new THREE.Color('#7a0c14'); // rojo sangre, profundo
  const colOuter = new THREE.Color('#ff2b2b'); // rojo vivo

  const SIZE = 2.3;
  let maxRadius = 0;
  for(let i=0;i<COUNT;i++) maxRadius = Math.max(maxRadius, Math.hypot(heartVerts[i*3], heartVerts[i*3+1], heartVerts[i*3+2]));
  const HEART_BASE_RADIUS = maxRadius * SIZE; // radio real del corazón en unidades de mundo cuando heart.scale = 1

  for(let i=0;i<COUNT;i++){
    const vx = heartVerts[i*3], vy = heartVerts[i*3+1], vz = heartVerts[i*3+2];

    positions[i*3]   = vx*SIZE;
    positions[i*3+1] = vy*SIZE;
    positions[i*3+2] = vz*SIZE;
    origPositions[i*3]   = positions[i*3];
    origPositions[i*3+1] = positions[i*3+1];
    origPositions[i*3+2] = positions[i*3+2];

    const r = Math.hypot(vx,vy,vz) / maxRadius;
    const c = colInner.clone().lerp(colOuter, r);
    colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
  }

  // --- Globo terráqueo: mismos COUNT puntos, redistribuidos en una esfera (Fibonacci).
  // Se mantiene la paleta roja del corazón: los "continentes" no son de otro color,
  // son puntos rojos mas brillantes y mas grandes (el shader usa este brillo como tamaño),
  // dando una sensacion de mayor densidad sin agregar puntos nuevos.
  //
  // Nota sobre Globe.obj: es una esfera prácticamente perfecta (radio 99.9–100.05, sin relieve
  // de continentes) y no viene con textura — no trae informacion de costas en si misma, asi que
  // usarla tal cual no habria dado mas precision. En su lugar, los continentes de abajo son
  // polígonos de costa simplificados (lon/lat reales, bajo detalle pero reconocibles), probados
  // punto por punto contra cada vertice de la esfera. ---
  function pointInPolygon(x, y, poly){
    let inside = false;
    for(let i=0, j=poly.length-1; i<poly.length; j=i++){
      const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
      const intersect = ((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
      if(intersect) inside = !inside;
    }
    return inside;
  }
  // costas simplificadas (bajo detalle, pero con la silueta real de cada continente) en [lon, lat] grados
  const CONTINENTS = [
    [[-17,15],[-10,32],[10,37],[20,33],[36,32],[44,12],[51,12],[43,-1],[40,-15],[35,-25],[20,-35],[12,-18],[9,3],[-2,6],[-8,5],[-17,15]], // Africa
    [[-10,36],[-9,43],[5,51],[10,58],[30,60],[45,66],[60,68],[80,73],[100,72],[130,71],[143,60],[170,66],[178,68],[160,55],[140,45],[122,31],[110,20],[95,15],[80,8],[68,24],[60,25],[48,30],[35,37],[28,40],[18,40],[-10,36]], // Eurasia
    [[-158,68],[-165,60],[-150,58],[-130,55],[-124,48],[-117,32],[-105,20],[-97,26],[-88,30],[-80,25],[-75,35],[-70,41],[-65,45],[-55,50],[-60,60],[-80,62],[-95,60],[-110,58],[-140,70],[-158,68]], // America del Norte
    [[-77,8],[-70,10],[-60,10],[-50,4],[-35,-6],[-38,-13],[-40,-23],[-48,-25],[-58,-35],[-68,-42],[-75,-45],[-73,-53],[-70,-55],[-72,-40],[-80,-5],[-77,8]], // America del Sur
    [[113,-22],[122,-18],[131,-12],[142,-11],[145,-17],[153,-28],[150,-37],[140,-38],[131,-32],[114,-30],[113,-22]], // Australia
    [[-45,60],[-30,68],[-20,75],[-25,83],[-55,82],[-70,75],[-58,65],[-45,60]] // Groenlandia
  ];
  function isLand(lonDeg, latDeg){
    if(latDeg < -68) return true; // Antártida (casquete polar sur)
    for(const poly of CONTINENTS){ if(pointInPolygon(lonDeg, latDeg, poly)) return true; }
    return false;
  }

  const globePositions = new Float32Array(COUNT*3);
  const globeColors = new Float32Array(COUNT*3);
  const colGlobeDim = new THREE.Color('#4a0810');    // "océano": rojo oscuro, puntos mas discretos
  const colGlobeBright = new THREE.Color('#ff3b3b'); // "continente": rojo vivo, puntos mas grandes/brillantes
  const GLOBE_R = 2.0;
  const GOLDEN = Math.PI * (3 - Math.sqrt(5));
  for(let i=0;i<COUNT;i++){
    const yFrac = 1 - (i / (COUNT-1)) * 2; // 1 -> -1, distribución uniforme en la esfera
    const radiusAtY = Math.sqrt(Math.max(0, 1 - yFrac*yFrac));
    const theta = GOLDEN * i;
    const gx = Math.cos(theta) * radiusAtY;
    const gz = Math.sin(theta) * radiusAtY;
    const gy = yFrac;
    globePositions[i*3]   = gx * GLOBE_R;
    globePositions[i*3+1] = gy * GLOBE_R;
    globePositions[i*3+2] = gz * GLOBE_R;

    const latDeg = Math.asin(gy) * 180 / Math.PI;
    const lonDeg = Math.atan2(gz, gx) * 180 / Math.PI;
    const landF = isLand(lonDeg, latDeg) ? 1 : 0;
    const c = colGlobeDim.clone().lerp(colGlobeBright, landF);
    globeColors[i*3]=c.r; globeColors[i*3+1]=c.g; globeColors[i*3+2]=c.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aOrig', new THREE.BufferAttribute(origPositions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aGlobe', new THREE.BufferAttribute(globePositions, 3));
  geo.setAttribute('aColorGlobe', new THREE.BufferAttribute(globeColors, 3));

  const uniforms = {
    uHand: { value: new THREE.Vector2(0,0) },   // offset de la mano, suavizado, rango ~[-1,1]
    uStretch: { value: 1.4 },                    // fuerza del estiramiento
    uPulse: { value: 0.0 },                       // latido idle
    uSize: { value: 54.0 },
    uMorph: { value: 0.0 },                       // 0 = corazón, 1 = globo terráqueo
    uGlitch: { value: 0.0 },                      // 0 = estable, 1 = manos muy separadas
    uTime: { value: 0.0 }
  };

  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexColors:true,
    transparent:true,
    depthWrite:false,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      attribute vec3 aOrig;
      attribute vec3 aGlobe;
      attribute vec3 aColorGlobe;
      varying vec3 vColor;
      uniform vec2 uHand;
      uniform float uStretch;
      uniform float uPulse;
      uniform float uSize;
      uniform float uMorph;
      uniform float uGlitch;
      uniform float uTime;

      float rand(vec2 co){
        return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453);
      }

      void main(){
        vColor = mix(color, aColorGlobe, uMorph);

        vec3 heartPos = aOrig;

        // respiracion / latido idle (solo aplica de verdad cuando aun es corazón)
        heartPos *= (1.0 + uPulse * (1.0 - uMorph));

        // estiramiento direccional: el lado hacia el que se mueve la mano se estira mas
        float dirX = heartPos.x * uHand.x;
        float wX = dirX > 0.0 ? 1.0 : 0.28;
        heartPos.x += uHand.x * uStretch * wX * abs(heartPos.x) * (1.0 - uMorph);

        float dirY = heartPos.y * uHand.y;
        float wY = dirY > 0.0 ? 1.0 : 0.28;
        heartPos.y += uHand.y * uStretch * wY * abs(heartPos.y) * (1.0 - uMorph);

        // globo: rotación propia lenta tipo "Tierra girando", independiente del gesto
        float ga = uTime * 0.18;
        vec3 globePos = vec3(
          aGlobe.x * cos(ga) - aGlobe.z * sin(ga),
          aGlobe.y,
          aGlobe.x * sin(ga) + aGlobe.z * cos(ga)
        );

        vec3 pos = mix(heartPos, globePos, uMorph);

        // glitch: dispersión pseudoaleatoria por punto, parpadea con el tiempo
        if(uGlitch > 0.005){
          float n1 = rand(aOrig.xy * 3.7 + floor(uTime * 14.0));
          float n2 = rand(aOrig.yz * 5.1 + floor(uTime * 14.0) + 7.0);
          float n3 = rand(aOrig.zx * 2.3 + floor(uTime * 14.0) + 13.0);
          pos += (vec3(n1,n2,n3) - 0.5) * uGlitch * 0.9;
        }

        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        float globeDensity = mix(1.0, 0.5 + aColorGlobe.r * 1.1, uMorph); // continentes = puntos mas grandes/densos
        gl_PointSize = uSize * (1.0 / -mv.z) * (1.0 - uMorph*0.2) * globeDensity;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main(){
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if(d > 0.5) discard;
        float alpha = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(vColor, alpha*0.85);
      }
    `
  });

  const heart = new THREE.Points(geo, material);
  scene.add(heart);

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const clock = new THREE.Clock();
  function heartbeat(t, speed){
    const period = 1.15 / speed;
    const phase = (t % period) / period;
    const lub = Math.exp(-Math.pow((phase-0.05)*22,2));
    const dub = Math.exp(-Math.pow((phase-0.24)*22,2)) * 0.55;
    return (lub+dub) * 0.045;
  }

  /* ------------------------------------------------------------------ *
   *  2. AUDIO — Tone.js  (voz en vivo -> pitch + filtro, mas vocoder real)
   * ------------------------------------------------------------------ */

  let mic, pitchShift, formantFilter, bitcrusher, glitchDelay, glitchTremolo, dryGain, chorus, reverb, gain, chordSynth;
  let vocoderCarrierBus, vocoderOutGain, vocoderBands = [];
  let audioReady = false;

  // bandas del vocoder: cubren el rango tipico de formantes vocales.
  // cada banda: filtra la voz -> extrae su envolvente -> esa envolvente controla
  // el volumen de la MISMA banda filtrada del acorde (el "carrier"). El acorde en si
  // nunca sale directo a los parlantes: solo se oye "a traves" de la voz.
  const VOCODER_BANDS = [180, 300, 480, 760, 1200, 1900, 3000, 4500];

  async function initAudio(){
    await Tone.start();
    mic = new Tone.UserMedia();
    await mic.open();

    // --- cadena "expresiva" existente: altura de mano -> pitch, pinza -> filtro ---
    pitchShift = new Tone.PitchShift({ pitch: 0, windowSize: 0.06 });
    formantFilter = new Tone.Filter({ frequency: 1800, type: 'bandpass', Q: 4 });
    bitcrusher = new Tone.BitCrusher(8);
    bitcrusher.wet.value = 0;
    glitchDelay = new Tone.FeedbackDelay({ delayTime: 0.055, feedback: 0.5, wet: 0 });
    glitchTremolo = new Tone.Tremolo({ frequency: 14, depth: 0, spread: 0 }).start();
    chorus = new Tone.Chorus({ frequency: 2.5, delayTime: 3.5, depth: 0.3, wet: 0.25 }).start();
    dryGain = new Tone.Gain(1); // se atenua cuando el vocoder esta activo, para que el acorde domine
    reverb = new Tone.Reverb({ decay: 3.2, wet: 0.22 });
    gain = new Tone.Gain(0.9);

    mic.connect(pitchShift);
    pitchShift.connect(formantFilter);
    formantFilter.connect(bitcrusher);
    bitcrusher.connect(glitchDelay);
    glitchDelay.connect(glitchTremolo);
    glitchTremolo.connect(chorus);
    chorus.connect(dryGain);
    dryGain.connect(reverb);
    reverb.connect(gain);
    gain.toDestination();

    // --- acorde: sierra rica en armonicos, es el "carrier" del vocoder, NUNCA suena solo ---
    chordSynth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sawtooth' },
      envelope: { attack: 0.03, decay: 0.1, sustain: 0.9, release: 0.4 }
    });
    chordSynth.volume.value = -4;
    vocoderCarrierBus = new Tone.Gain(1);
    chordSynth.connect(vocoderCarrierBus);

    // --- vocoder: banco de bandas, la voz (moduladora) esculpe el acorde (carrier) ---
    vocoderOutGain = new Tone.Gain(0);
    const modBus = new Tone.Gain(1);
    mic.connect(modBus); // toma la voz cruda en paralelo, antes del pitch/filtro expresivo

    VOCODER_BANDS.forEach(freq=>{
      const modFilter = new Tone.Filter({ frequency: freq, type: 'bandpass', Q: 6 });
      const rectify = new Tone.WaveShaper((x)=> Math.abs(x), 1024);
      const smooth = new Tone.Filter({ frequency: 22, type: 'lowpass', Q: 0.5 });
      const envBoost = new Tone.Gain(6); // la voz cruda es floja, se amplifica antes de modular
      const carrierFilter = new Tone.Filter({ frequency: freq, type: 'bandpass', Q: 6 });
      const carrierGain = new Tone.Gain(0);

      modBus.connect(modFilter);
      modFilter.connect(rectify);
      rectify.connect(smooth);
      smooth.connect(envBoost);
      envBoost.connect(carrierGain.gain); // la envolvente de la voz controla el volumen de esta banda del acorde

      vocoderCarrierBus.connect(carrierFilter);
      carrierFilter.connect(carrierGain);
      carrierGain.connect(vocoderOutGain);

      vocoderBands.push({ modFilter, carrierFilter, carrierGain });
    });

    vocoderOutGain.connect(reverb);

    audioReady = true;
  }

  function updateAudio(handOffset, pinch, active){
    if(!audioReady) return;
    // altura de la mano -> pitch (-12 a +12 semitonos)
    const pitch = active ? THREE.MathUtils.clamp(handOffset.y * 14, -14, 14) : 0;
    pitchShift.pitch = pitch;

    // apertura de los dedos (pinza pulgar-indice) -> apertura del filtro (robotico <-> aireado)
    const freq = active ? THREE.MathUtils.mapLinear(THREE.MathUtils.clamp(pinch, 0.15, 1.3), 0.15, 1.3, 260, 4200) : 1800;
    formantFilter.frequency.rampTo(freq, 0.08);
    formantFilter.Q.value = active ? THREE.MathUtils.mapLinear(freq, 260, 4200, 9, 2) : 4;

    document.getElementById('v-pitch').textContent = pitch.toFixed(1) + ' st';
    document.getElementById('v-filter').textContent = Math.round(freq) + ' Hz';
  }

  /* ------------------------------------------------------------------ *
   *  2b. GESTOS -> ACORDES DE CADA CONCIERTO
   *  indice = concierto 1 · indice+medio = 1+2 · indice+medio+anular = 1+2+3
   * ------------------------------------------------------------------ */

  const CONCERTS = [
    { city:'Bogotá',    date:'21 agosto', notes:[57,60,64,67] }, // A3 C4 E4 G4 — Am7
    { city:'Pereira',   date:'28 agosto', notes:[53,57,60,64] }, // F3 A3 C4 E4 — Fmaj7
    { city:'Manizales', date:'29 agosto', notes:[52,55,59,62] }  // E3 G3 B3 D4 — Em7
  ];

  let currentGesture = 0;

  function triggerConcertChord(idx){
    const notes = CONCERTS[idx-1].notes;
    if(chordSynth) chordSynth.triggerAttack(notes.map(n=>Tone.Frequency(n,'midi').toNote()));
  }
  function releaseChord(){
    if(chordSynth) chordSynth.releaseAll();
  }

  // deteccion de dedos levantados: distancia punta-muñeca vs distancia articulacion-muñeca,
  // funciona sea cual sea la orientacion de la mano (no depende de "arriba/abajo" en pantalla)
  function fingerExtended(lm, tipIdx, pipIdx){
    const tip = lm[tipIdx], pip = lm[pipIdx], wrist = lm[0];
    const dTip = Math.hypot(tip.x-wrist.x, tip.y-wrist.y);
    const dPip = Math.hypot(pip.x-wrist.x, pip.y-wrist.y);
    return dTip > dPip * 1.15;
  }
  function getFingerState(lm){
    return {
      index:  fingerExtended(lm, 8, 6),
      middle: fingerExtended(lm, 12, 10),
      ring:   fingerExtended(lm, 16, 14),
      pinky:  fingerExtended(lm, 20, 18)
    };
  }
  // indice = concierto 1 · indice+medio = 1+2 · indice+medio+anular = 1+2+3 (el pulgar ya no se usa, poco fiable)
  function detectGesture(f){
    if(f.index && !f.middle && !f.ring && !f.pinky) return 1;
    if(f.index && f.middle && !f.ring && !f.pinky) return 2;
    if(f.index && f.middle && f.ring && !f.pinky) return 3;
    return 0;
  }


  /* ------------------------------------------------------------------ *
   *  3. SEGUIMIENTO DE MANOS — MediaPipe Hands
   * ------------------------------------------------------------------ */

  const videoEl = document.getElementById('cam-bg');
  const overlay = document.getElementById('hand-overlay');
  const octx = overlay.getContext('2d');

  const smoothed = { x:0, y:0 };
  let pinchDist = 0.5;
  let handActive = false;
  let objTargetX = 0, objTargetY = 0;
  let objTargetSpread = 0.18; // distancia normalizada (fraccion de pantalla) que define el tamaño real del objeto

  // ratio pulgar-indice / tamaño de la palma -> independiente de que tan lejos este la mano de la camara
  function handOpenness(lm){
    const dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
    const spread = Math.hypot(dx, dy);
    const px = lm[0].x - lm[9].x, py = lm[0].y - lm[9].y;
    const palm = Math.hypot(px, py) || 0.0001; // muñeca -> base del dedo medio, escala con el tamaño de la mano en imagen
    return spread / palm;
  }

  const hands = new Hands({
    locateFile: (f)=> `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
    selfieMode: true
  });

  let isSpinning = false;
  let heartScale = 1.0;
  const heartPos = { x: 0, y: 0 };
  const OPEN_THRESHOLD = 0.75; // ratio a partir del cual se considera "mano abierta", ya no depende de la distancia a la camara
  let glitchTarget = 0;
  const HANDS_APART_THRESHOLD = 0.42; // distancia normalizada entre muñecas a partir de la cual arranca el glitch — ajustable
  const HANDS_APART_RANGE = 0.28;      // sobre cuantos "unidades" de distancia sube el glitch de 0 a 1 — ajustable

  hands.onResults((results)=>{
    overlay.width = videoEl.clientWidth;
    overlay.height = videoEl.clientHeight;
    octx.save();
    octx.clearRect(0,0,overlay.width,overlay.height);

    if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
      handActive = true;
      const handsLm = results.multiHandLandmarks;

      // dibuja el esqueleto de cada mano detectada
      handsLm.forEach(lm=>{
        drawConnectors(octx, lm, HAND_CONNECTIONS, { color: 'rgba(224,24,31,0.65)', lineWidth: 1.5 });
        drawLandmarks(octx, lm, { color: '#e0181f', lineWidth: 0, radius: 2 });
      });

      // mano principal (la primera detectada) -> estiramiento, pitch, filtro, tamaño
      const lm = handsLm[0];
      const palm = lm[9];
      const targetX = (palm.x - 0.5) * 2;
      const targetY = (0.5 - palm.y) * 2;
      smoothed.x += (targetX - smoothed.x) * 0.16;
      smoothed.y += (targetY - smoothed.y) * 0.16;

      // apertura de la mano (ratio, no distancia bruta) -> controla el filtro de voz
      const target = handOpenness(lm);
      pinchDist += (target - pinchDist) * 0.2;

      // posicion/tamaño REAL del objeto 3D: con dos manos, se ubica en el punto medio entre ellas
      // y su tamaño es la distancia real entre ambas (como si lo sostuvieras con las dos);
      // con una sola mano, sigue la palma y su tamaño es la pinza pulgar-indice. Así el objeto
      // no aparece en otro punto de la pantalla ni crece mas alla de lo que abarcan tus manos.
      if(handsLm.length === 2){
        const p0 = handsLm[0][9], p1 = handsLm[1][9];
        objTargetX = ((p0.x+p1.x)/2 - 0.5) * 2;
        objTargetY = (0.5 - (p0.y+p1.y)/2) * 2;
        objTargetSpread = Math.hypot(p0.x-p1.x, p0.y-p1.y) * 0.55; // radio ≈ mitad de la distancia entre manos
      } else {
        objTargetX = targetX;
        objTargetY = targetY;
        const dxp = lm[4].x - lm[8].x, dyp = lm[4].y - lm[8].y;
        objTargetSpread = Math.hypot(dxp, dyp) * 0.9;
      }

      // gesto de dedos de la mano principal -> acorde + revelado ACUMULATIVO de conciertos
      // indice = Bogotá, indice+medio = Bogotá+Pereira, indice+medio+anular = los 3
      const fState = getFingerState(lm);
      const gesture = detectGesture(fState);
      if(gesture !== currentGesture){
        releaseChord();
        if(gesture !== 0) triggerConcertChord(gesture);
        currentGesture = gesture;
        document.querySelectorAll('.tour-dates span').forEach((el,i)=>{
          el.classList.toggle('active', i < gesture);
        });
        document.getElementById('v-concert').textContent = gesture
          ? CONCERTS.slice(0, gesture).map(c=>c.city).join(' + ')
          : '—';
      }

      // ambas manos abiertas a la vez -> el corazon gira sobre si mismo
      // ambas manos separadas mas alla del umbral -> glitch en la voz
      if(handsLm.length === 2){
        const openness = handsLm.map(handOpenness);
        isSpinning = openness.every(o => o > OPEN_THRESHOLD);
        const w0 = handsLm[0][0], w1 = handsLm[1][0];
        const handsDist = Math.hypot(w0.x-w1.x, w0.y-w1.y);
        glitchTarget = THREE.MathUtils.clamp((handsDist - HANDS_APART_THRESHOLD) / HANDS_APART_RANGE, 0, 1);
      } else {
        isSpinning = false;
        // una mano se sale del encuadre justo cuando las separas mucho — no lo cortes de golpe,
        // deja que decaiga suave para no perder el glitch en ese instante
        glitchTarget += (0 - glitchTarget) * 0.04;
      }

      document.getElementById('v-hand').textContent = handsLm.length === 2 ? 'dos manos' : 'detectada';
      document.getElementById('v-hand').classList.add('on');
    } else {
      handActive = false;
      isSpinning = false;
      glitchTarget = 0;
      smoothed.x += (0 - smoothed.x) * 0.08;
      smoothed.y += (0 - smoothed.y) * 0.08;
      if(currentGesture !== 0){
        releaseChord();
        currentGesture = 0;
        document.querySelectorAll('.tour-dates span').forEach(el=>el.classList.remove('active'));
        document.getElementById('v-concert').textContent = '—';
      }
      document.getElementById('v-hand').textContent = '—';
      document.getElementById('v-hand').classList.remove('on');
    }
    octx.restore();
  });

  let mpCamera = null;

  async function initCamera(){
    await new Promise((resolve, reject)=>{
      navigator.mediaDevices.getUserMedia({ video:true, audio:false })
        .then(stream=>{ videoEl.srcObject = stream; videoEl.onloadedmetadata = ()=>resolve(); })
        .catch(reject);
    });
    mpCamera = new Camera(videoEl, {
      onFrame: async ()=>{ await hands.send({ image: videoEl }); },
      width: 640, height: 480
    });
    mpCamera.start();
  }

  /* ------------------------------------------------------------------ *
   *  4. LOOP
   * ------------------------------------------------------------------ */

  let elapsed = 0;
  const SPIN_SPEED = 1.6;   // rad/seg cuando ambas manos estan abiertas
  const IDLE_SWAY = 0.05;   // rad/seg de balanceo suave en reposo
  let glitchAmt = 0;
  let morphAmt = 0;
  let vocoderAmt = 0;
  const MORPH_THRESHOLD = 0.5; // por debajo de este tamaño el corazón empieza a mutar en globo terráqueo
  const HEART_MIN_SCALE = 0.32;  // el objeto nunca se ve mas chico que esto
  const HEART_MAX_SCALE = 0.85;  // ni mas grande que esto — se queda dentro del espacio real de las manos

  // tamaño del "mundo" 3D visible a la profundidad del corazón (z=0), segun el FOV real de la cámara.
  // así la posicion/tamaño del objeto se puede convertir 1:1 desde coordenadas de pantalla/manos.
  function visibleSizeAtHeart(){
    const dist = camera.position.z; // el corazón vive en z=0
    const height = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov/2)) * dist;
    const width = height * camera.aspect;
    return { width, height };
  }

  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    elapsed += dt;

    const speed = 1 + Math.abs(smoothed.x) + Math.abs(smoothed.y); // el gesto acelera el latido
    uniforms.uPulse.value = heartbeat(elapsed, speed);
    uniforms.uHand.value.set(smoothed.x, smoothed.y);
    uniforms.uTime.value = elapsed;

    const visible = visibleSizeAtHeart();

    // tamaño REAL: el radio del objeto iguala el radio real (en unidades de mundo) que separa
    // tus manos (o tus dedos con una sola mano) — nunca "mas grande" que ese espacio.
    const targetWorldRadius = objTargetSpread * visible.width;
    const targetScale = THREE.MathUtils.clamp(targetWorldRadius / HEART_BASE_RADIUS, HEART_MIN_SCALE, HEART_MAX_SCALE);
    heartScale += (targetScale - heartScale) * 0.14;
    heart.scale.setScalar(heartScale);

    // corazón pequeño -> muta hacia el globo terráqueo
    const targetMorph = heartScale < MORPH_THRESHOLD ? 1 : 0;
    morphAmt += (targetMorph - morphAmt) * 0.05;
    uniforms.uMorph.value = morphAmt;

    // gesto activo -> el acorde (vocoder) domina, se atenua la voz "seca"
    const vocoderTarget = currentGesture !== 0 ? 1 : 0;
    vocoderAmt += (vocoderTarget - vocoderAmt) * 0.15;
    if(audioReady){
      vocoderOutGain.gain.rampTo(vocoderAmt * 1.5, 0.06);
      dryGain.gain.rampTo(1 - vocoderAmt * 0.8, 0.08);
    }

    // manos muy separadas -> glitch visual + en la voz (bitcrush + eco + tartamudeo tremolo)
    glitchAmt += (glitchTarget - glitchAmt) * 0.18;
    uniforms.uGlitch.value = glitchAmt;
    document.getElementById('ui').classList.toggle('glitching', glitchAmt > 0.15);
    document.getElementById('v-glitch').textContent = Math.round(glitchAmt*100) + '%';
    if(audioReady){
      bitcrusher.wet.rampTo(glitchAmt, 0.05);
      glitchDelay.wet.rampTo(glitchAmt * 0.7, 0.05);
      bitcrusher.bits = glitchAmt > 0.08 ? (1 + Math.floor(Math.random()*3)) : 8;
      glitchTremolo.depth.rampTo(glitchAmt * 0.9, 0.05);
      if(glitchAmt > 0.1 && Math.random() < 0.15){
        glitchTremolo.frequency.value = 6 + Math.random()*28; // tartamudeo irregular, no un trémolo parejo
      }
    }

    // posicion REAL: se convierte la posicion normalizada de la(s) mano(s) a coordenadas de mundo
    // usando el mismo FOV que la cámara — el objeto queda exactamente donde estan tus manos.
    const worldX = objTargetX * (visible.width / 2);
    const worldY = objTargetY * (visible.height / 2);
    heartPos.x += (worldX - heartPos.x) * 0.16;
    heartPos.y += (worldY - heartPos.y) * 0.16;
    heart.position.set(heartPos.x, heartPos.y, 0);

    // rotacion: giro rapido con las dos manos abiertas, balanceo suave en reposo
    heart.rotation.y += (isSpinning ? SPIN_SPEED : IDLE_SWAY) * dt;

    document.getElementById('v-stretch').textContent =
      Math.max(Math.abs(smoothed.x), Math.abs(smoothed.y)).toFixed(2);
    document.getElementById('v-size').textContent = heartScale.toFixed(2);
    const rotEl = document.getElementById('v-rot');
    rotEl.textContent = isSpinning ? 'activa' : '—';
    rotEl.classList.toggle('on', isSpinning);

    updateAudio(smoothed, pinchDist, handActive);

    renderer.render(scene, camera);
  }
  animate();

  /* ------------------------------------------------------------------ *
   *  5. ARRANQUE
   * ------------------------------------------------------------------ */

  const stageToggle = document.getElementById('stage-toggle');
  const formatToggle = document.getElementById('format-toggle');
  const reelMask = document.getElementById('reel-mask');
  const uiRoot = document.getElementById('ui');

  function setStageMode(on, { fullscreen = false } = {}){
    uiRoot.classList.toggle('stage-mode', on);
    stageToggle.textContent = on ? 'Salir de escenario' : 'Modo escenario';
    if(fullscreen){
      if(on && document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen().catch(()=>{});
      } else if(!on && document.exitFullscreen && document.fullscreenElement){
        document.exitFullscreen().catch(()=>{});
      }
    }
  }
  function setReelMode(on){
    reelMask.classList.toggle('active', on);
    uiRoot.classList.toggle('reel-mode', on);
    formatToggle.textContent = on ? 'Formato completo' : 'Formato Reel';
  }

  stageToggle.addEventListener('click', ()=> setStageMode(!uiRoot.classList.contains('stage-mode'), { fullscreen:true }));
  formatToggle.addEventListener('click', ()=> setReelMode(!reelMask.classList.contains('active')));

  // atajos de teclado para usar en vivo sin tocar el mouse:
  // H = mostrar/ocultar el panel de control · R = marco vertical 9:16 para grabar Reels
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'h' || e.key === 'H') setStageMode(!uiRoot.classList.contains('stage-mode'));
    if(e.key === 'r' || e.key === 'R') setReelMode(!reelMask.classList.contains('active'));
  });

  const btn = document.getElementById('start-btn');
  btn.addEventListener('click', async ()=>{
    btn.disabled = true;
    btn.textContent = 'activando…';
    try{
      await initAudio();
      await initCamera();
      btn.textContent = 'en vivo';
      btn.classList.add('live');
    }catch(err){
      btn.disabled = false;
      btn.textContent = 'error — reintentar';
      console.error(err);
    }
  });

})();
</script>
</body>
</html>
